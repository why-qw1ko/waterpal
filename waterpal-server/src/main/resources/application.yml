server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/waterpal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.waterpal.server.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: waterpal-secret-key-2026-must-be-at-least-32-chars-long
  expiration: 86400000  # 24 小时

# Firebase 配置
firebase:
  config-path: firebase-service-account.json

# 日志
logging:
  level:
    com.waterpal.server: debug
