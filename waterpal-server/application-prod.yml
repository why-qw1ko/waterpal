# 生产环境配置
server:
  port: 8080

spring:
  datasource:
    # Docker 网络中使用服务名
    url: jdbc:mysql://mysql:3306/waterpal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.waterpal.server.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 日志
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT 配置
jwt:
  secret: waterpal-secret-key-2026-must-be-at-least-32-chars-long
  expiration: 86400000  # 24 小时

# Firebase 配置（模拟模式）
firebase:
  config-path: firebase-service-account.json
  mock-mode: true  # 模拟模式，不实际发送推送

# 日志
logging:
  level:
    com.waterpal.server: info
    org.springframework: warn
