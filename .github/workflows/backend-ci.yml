# GitHub Actions CI/CD for WaterPal Backend

name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'waterpal-server/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'waterpal-server/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: |
        cd waterpal-server
        mvn clean package -DskipTests
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: waterpal-server
        path: waterpal-server/target/*.jar
        retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./waterpal-server
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/waterpal-server:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/waterpal-server:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/waterpal-server:buildcache,mode=max
